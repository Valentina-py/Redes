<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1729">
<title>Estudiar · Tarjetas de Redes</title>
<style>
  :root {
    --bg: #0f1729; --text: #e8ecf4; --muted: #9aa6c0;
    --ring: rgba(255,255,255,.10); --accent: #2e8b57; --accent2: #57b07f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, Arial, sans-serif;
    background: radial-gradient(1100px 560px at 50% -8%, #1b2a4d 0%, var(--bg) 58%);
    color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
  }
  .top { display: flex; align-items: center; gap: 12px; max-width: 760px; margin: 0 auto; width: 100%; }
  .home { text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 600; line-height: 1;
    padding: 9px 14px; border-radius: 10px; border: 1px solid var(--ring); white-space: nowrap;
    display: inline-block; }
  .home::before { content: "\2190"; margin-right: 6px; }
  .home:hover { color: var(--text); background: rgba(255,255,255,.07); }
  .titlebox { flex: 1; min-width: 0; }
  .titlebox h1 { font-size: 15px; margin: 0; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .titlebox .sub { font-size: 12px; color: var(--muted); }
  .counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }

  .progress { max-width: 760px; margin: 14px auto 0; width: 100%; height: 6px; border-radius: 5px;
    background: rgba(255,255,255,.08); overflow: hidden; }
  .progress > span { display: block; height: 100%; width: 0; border-radius: 5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .35s ease; }

  .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 22px 0; }
  .scene { width: 100%; max-width: 760px; perspective: 1600px; }
  .card { position: relative; width: 100%; min-height: 360px; cursor: pointer;
    transform-style: preserve-3d; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
  .card.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 22px; padding: 28px 26px 60px; display: flex; flex-direction: column;
    border: 1px solid var(--ring); box-shadow: 0 24px 60px rgba(0,0,0,.45);
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .front { background: linear-gradient(160deg, #1d2a48, #16203a); }
  .back  { background: linear-gradient(160deg, #15281f, #122017); transform: rotateY(180deg); }
  .tag { align-self: flex-start; font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 4px 11px; border-radius: 100px; margin-bottom: 16px; color: #fff; max-width: 100%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .q, .a { overflow-wrap: break-word; word-wrap: break-word; hyphens: auto; -webkit-hyphens: auto; }
  .q { font-size: clamp(17px, 4.5vw, 23px); font-weight: 700; line-height: 1.35; }
  .a { font-size: clamp(13.5px, 3.6vw, 16px); line-height: 1.55; }
  .a ul { margin: 8px 0; padding-left: 20px; }
  .a li { margin-bottom: 5px; }
  .a strong { color: var(--accent2); }
  .a em { color: #cfe6da; font-style: italic; }
  .formula { background: rgba(255,255,255,.06); border-left: 3px solid var(--accent2);
    padding: 7px 12px; margin: 8px 0; font-family: "Consolas", monospace; font-size: clamp(13px,3.4vw,15px);
    border-radius: 6px; white-space: pre-wrap; overflow-wrap: break-word; }
  table.layers { width: 100%; border-collapse: collapse; font-size: clamp(12px,3.2vw,14px); margin-top: 6px;
    table-layout: fixed; }
  table.layers td { border: 1px solid rgba(255,255,255,.12); padding: 6px 9px; vertical-align: top;
    overflow-wrap: break-word; word-wrap: break-word; }
  table.layers td.cap { font-weight: 700; color: var(--accent2); width: 30%; }
  .layer-block { border-left: 3px solid var(--accent2); background: rgba(255,255,255,.04);
    border-radius: 8px; padding: 8px 12px; margin: 8px 0; font-size: 13.5px; line-height: 1.5; }
  .layer-block .lh { font-weight: 800; color: var(--accent2); font-size: 14px; margin-bottom: 3px; letter-spacing: .3px; }
  .tip { margin-top: 12px; font-size: 13px; color: #cfe6da; background: rgba(255,255,255,.05);
    border-radius: 8px; padding: 8px 12px; }
  .hint { position: absolute; left: 0; right: 0; bottom: 22px; text-align: center;
    font-size: 12px; color: var(--muted); pointer-events: none; }

  .controls { max-width: 760px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .judge { display: flex; gap: 12px; }
  .judge button { flex: 1; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; color: #fff; transition: transform .12s ease, filter .12s ease; }
  .judge button:active { transform: scale(.97); }
  .review { background: linear-gradient(135deg, #c0392b, #e05a48); }
  .known  { background: linear-gradient(135deg, #1e7a48, #2fae6a); }
  .judge button:hover { filter: brightness(1.08); }
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .nav button, .nav a { background: rgba(255,255,255,.06); border: 1px solid var(--ring); color: var(--text);
    border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .nav button:hover { background: rgba(255,255,255,.12); }
  .nav .group { display: flex; gap: 8px; }
  .nav button.active { background: var(--accent); border-color: transparent; }
  .state { font-size: 12px; color: var(--muted); margin-left: 4px; }

  .done { text-align: center; max-width: 520px; margin: auto; }
  .done .big { font-size: 54px; margin-bottom: 6px; }
  .done h2 { margin: 0 0 8px; }
  .done p { color: var(--muted); margin: 0 0 22px; }
  .done .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .done a, .done button { background: rgba(255,255,255,.07); border: 1px solid var(--ring); color: var(--text);
    border-radius: 12px; padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .done .primary { background: linear-gradient(135deg, #1e7a48, #2fae6a); border: none; }
  .hide { display: none !important; }
  @media (max-width: 560px) {
    body { padding: 12px 10px calc(14px + env(safe-area-inset-bottom)); }
    .face { padding: 22px 18px 56px; }
    .card { min-height: 340px; }
    .layer-block { padding: 7px 10px; font-size: 13px; }
    .nav { flex-wrap: wrap; }
    .nav .group { order: 3; width: 100%; }
    .nav .group button { flex: 1; }
    .nav button, .nav a { padding: 10px 12px; font-size: 13px; }
    .judge button { padding: 13px; font-size: 14px; }
    .titlebox h1 { font-size: 14px; }
  }
  @media (max-width: 380px) {
    .tag { white-space: normal; }
    table.layers td.cap { width: 34%; }
  }
</style>
</head>
<body>

  <div class="top">
    <a class="home" href="index.html" title="Volver a la pantalla principal">Inicio</a>
    <div class="titlebox">
      <h1 id="deckTitle">…</h1>
      <div class="sub" id="modeLabel"></div>
    </div>
    <div class="counter" id="counter"></div>
  </div>
  <div class="progress"><span id="bar"></span></div>

  <div class="stage" id="stage">
    <div class="scene">
      <div class="card" id="card">
        <div class="face front">
          <span class="tag" id="tag"></span>
          <div class="label">Pregunta</div>
          <div class="q" id="qText"></div>
          <div class="hint">Tocá la tarjeta o pulsá <b>Espacio</b> para ver la respuesta</div>
        </div>
        <div class="face back">
          <div class="label">Respuesta</div>
          <div class="a" id="aText"></div>
          <div class="hint" id="stateHint"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <div class="judge">
      <button class="review" id="btnReview">↺ Repasar</button>
      <button class="known" id="btnKnown">✓ Lo sé</button>
    </div>
    <div class="nav">
      <button id="prev">← Anterior</button>
      <div class="group">
        <button id="shuffle" title="Mezclar">🔀 Mezclar</button>
        <button id="onlyReview" title="Estudiar solo las marcadas para repasar">★ Pendientes</button>
      </div>
      <button id="next">Siguiente →</button>
    </div>
  </div>

  <!-- Pantalla final -->
  <div class="stage hide" id="doneScreen">
    <div class="done">
      <div class="big">🎉</div>
      <h2 id="doneTitle">¡Mazo completado!</h2>
      <p id="doneText"></p>
      <div class="row">
        <button class="primary" id="againReview">Repasar pendientes</button>
        <button id="restart">Empezar de nuevo</button>
        <a href="index.html">Volver al inicio</a>
      </div>
    </div>
  </div>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const deckId = params.get("deck") || "tp1";
  const deck = DECKS[deckId] || DECKS.tp1;
  const KEY = "redes-progress-" + deckId;

  // tema por mazo
  document.documentElement.style.setProperty("--accent", deck.color);
  document.documentElement.style.setProperty("--accent2", deck.color2);
  document.querySelector(".front").style.background =
    `linear-gradient(160deg, ${shade(deck.color,0.18)}, ${shade(deck.color,0.05)})`;
  document.querySelector(".back").style.background =
    `linear-gradient(160deg, ${shade(deck.color2,0.16)}, ${shade(deck.color2,0.04)})`;

  function shade(hex, a){ const n=parseInt(hex.slice(1),16),r=n>>16,g=(n>>8)&255,b=n&255;
    return `rgba(${Math.round(r*0.55+10)},${Math.round(g*0.55+15)},${Math.round(b*0.55+25)},${0.95})`; }

  let progress = {};
  try { progress = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { progress = {}; }
  function save(){ localStorage.setItem(KEY, JSON.stringify(progress)); }

  // cada tarjeta lleva su índice original como id estable
  const all = deck.cards.map((c, i) => ({ ...c, id: i }));
  let order = all.map(c => c.id);
  let onlyPending = false;
  let pos = 0;

  const el = {
    title: document.getElementById("deckTitle"),
    mode: document.getElementById("modeLabel"),
    counter: document.getElementById("counter"),
    bar: document.getElementById("bar"),
    card: document.getElementById("card"),
    tag: document.getElementById("tag"),
    q: document.getElementById("qText"),
    a: document.getElementById("aText"),
    stateHint: document.getElementById("stateHint"),
    stage: document.getElementById("stage"),
    controls: document.getElementById("controls"),
    done: document.getElementById("doneScreen"),
    doneText: document.getElementById("doneText"),
    doneTitle: document.getElementById("doneTitle"),
    btnReview: document.getElementById("btnReview"),
    btnKnown: document.getElementById("btnKnown"),
    onlyReview: document.getElementById("onlyReview"),
  };

  el.title.textContent = deck.title;

  function activeList(){
    return onlyPending ? order.filter(id => progress[id] !== "known") : order;
  }

  function render(){
    const list = activeList();
    if (list.length === 0){ showDone(); return; }
    el.stage.classList.remove("hide");
    el.controls.classList.remove("hide");
    el.done.classList.add("hide");

    if (pos >= list.length) pos = list.length - 1;
    if (pos < 0) pos = 0;
    const card = all[list[pos]];

    el.card.classList.remove("flipped");
    setTimeout(() => {
      el.q.innerHTML = card.q;
      el.a.innerHTML = card.a;
    }, el.card.classList.contains("flipped") ? 160 : 0);
    el.q.innerHTML = card.q;
    el.a.innerHTML = card.a;

    el.tag.textContent = card.tag || ("Tarjeta " + (card.id + 1));
    el.tag.style.background = `linear-gradient(135deg, ${deck.color}, ${deck.color2})`;

    const st = progress[card.id];
    el.btnKnown.classList.toggle("active", st === "known");
    el.btnReview.classList.toggle("active", st === "review");
    el.stateHint.innerHTML = st === "known" ? "✓ Marcada como <b>dominada</b>"
      : st === "review" ? "↺ Marcada para <b>repasar</b>"
      : "¿La sabías? Marcá abajo 👇";

    el.counter.textContent = (pos + 1) + " / " + list.length;
    const known = order.filter(id => progress[id] === "known").length;
    el.bar.style.width = Math.round(known / order.length * 100) + "%";
    el.mode.textContent = (onlyPending ? "Modo pendientes · " : "") + known + " de " + order.length + " dominadas";
    el.onlyReview.classList.toggle("active", onlyPending);
  }

  function flip(){ el.card.classList.toggle("flipped"); }
  function go(d){
    const list = activeList();
    pos += d;
    if (pos >= list.length){ showDone(); return; }
    if (pos < 0) pos = 0;
    render();
  }
  function mark(state){
    const list = activeList();
    const card = all[list[pos]];
    progress[card.id] = (progress[card.id] === state) ? null : state;
    save();
    // avanzar automáticamente al marcar "lo sé"
    if (progress[card.id] === "known"){ setTimeout(() => go(1), 180); }
    else render();
  }

  function showDone(){
    el.stage.classList.add("hide");
    el.controls.classList.add("hide");
    el.done.classList.remove("hide");
    const known = order.filter(id => progress[id] === "known").length;
    const pending = order.length - known;
    el.doneTitle.textContent = pending === 0 ? "¡Dominaste el mazo! 🏆" : "¡Recorriste todas!";
    el.doneText.textContent = pending === 0
      ? "Tenés las " + order.length + " tarjetas marcadas como dominadas. ¡Bien ahí!"
      : "Dominadas: " + known + " · Pendientes: " + pending + ". Seguí repasando las que faltan.";
  }

  // eventos
  el.card.addEventListener("click", flip);
  document.getElementById("next").addEventListener("click", () => go(1));
  document.getElementById("prev").addEventListener("click", () => go(-1));
  el.btnKnown.addEventListener("click", () => mark("known"));
  el.btnReview.addEventListener("click", () => mark("review"));

  document.getElementById("shuffle").addEventListener("click", () => {
    for (let i = order.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [order[i],order[j]]=[order[j],order[i]]; }
    pos = 0; render();
  });
  el.onlyReview.addEventListener("click", () => {
    onlyPending = !onlyPending; pos = 0;
    if (onlyPending && activeList().length === 0){ onlyPending = false; alert("¡No quedan tarjetas pendientes! Ya las dominás todas."); }
    render();
  });
  document.getElementById("restart").addEventListener("click", () => {
    if (confirm("¿Borrar el progreso de este mazo y empezar de nuevo?")){ progress = {}; save(); onlyPending = false; pos = 0; order = all.map(c=>c.id); render(); }
  });
  document.getElementById("againReview").addEventListener("click", () => { onlyPending = true; pos = 0;
    if (activeList().length === 0){ onlyPending = false; } render(); });

  // teclado
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space"){ e.preventDefault(); flip(); }
    else if (e.code === "ArrowRight"){ go(1); }
    else if (e.code === "ArrowLeft"){ go(-1); }
    else if (e.key === "1"){ mark("review"); }
    else if (e.key === "2"){ mark("known"); }
  });
  // swipe en celular
  let sx = 0;
  el.stage.addEventListener("touchstart", e => sx = e.changedTouches[0].clientX, {passive:true});
  el.stage.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 60){ go(dx < 0 ? 1 : -1); }
  }, {passive:true});

  render();
</script>
</body>
</html>
