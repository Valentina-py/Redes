<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1729">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Redes">
<title>Estudio de Redes · Tarjetas interactivas</title>
<style>
  :root {
    --bg: #0f1729;
    --bg2: #16213e;
    --card: #1b2740;
    --text: #e8ecf4;
    --muted: #9aa6c0;
    --ring: rgba(255,255,255,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1d2c52 0%, var(--bg) 55%);
    color: var(--text); min-height: 100vh;
    padding: 40px 20px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 36px; }
  .badge {
    display: inline-block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--ring); border-radius: 100px;
    padding: 5px 14px; margin-bottom: 16px;
  }
  h1 { font-size: clamp(26px, 5vw, 38px); margin: 0 0 8px; font-weight: 800; letter-spacing: -.5px; }
  .lead { color: var(--muted); font-size: 15px; max-width: 540px; margin: 0 auto; line-height: 1.5; }
  .decks { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; margin-top: 34px; }
  .deck {
    display: block; text-decoration: none; color: inherit; position: relative; overflow: hidden;
    background: var(--card); border: 1px solid var(--ring); border-radius: 18px; padding: 22px;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .deck:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(0,0,0,.4); border-color: rgba(255,255,255,.18); }
  .deck .bar { position: absolute; inset: 0 auto 0 0; width: 6px; }
  .deck .n { font-size: 12px; font-weight: 700; letter-spacing: .5px; opacity: .85; }
  .deck h2 { font-size: 19px; margin: 10px 0 6px; line-height: 1.25; }
  .deck p { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  .deck .meta { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .pill { background: rgba(255,255,255,.07); border-radius: 100px; padding: 4px 11px; font-weight: 600; }
  .go { font-weight: 700; opacity: .9; }
  .progress-mini { height: 5px; border-radius: 4px; background: rgba(255,255,255,.09); margin-top: 14px; overflow: hidden; }
  .progress-mini > span { display: block; height: 100%; width: 0; border-radius: 4px; transition: width .4s ease; }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; line-height: 1.6; }
  footer a { color: var(--muted); }
  .reset { background: none; border: 1px solid var(--ring); color: var(--muted); border-radius: 100px;
    padding: 6px 14px; font-size: 12px; cursor: pointer; margin-top: 8px; }
  .reset:hover { color: var(--text); border-color: rgba(255,255,255,.25); }
  .install { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px;
    background: linear-gradient(135deg, #2e8b57, #3a7bd5); color: #fff; border: none;
    border-radius: 100px; padding: 12px 22px; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 10px 28px rgba(46,139,87,.35); transition: transform .15s ease, filter .15s ease; }
  .install:hover { filter: brightness(1.08); transform: translateY(-2px); }
  .install:active { transform: scale(.97); }
  /* ===== Diálogo propio (reemplaza confirm del navegador) ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(6,10,20,.66); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 22px; z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity .18s ease; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal { width: 100%; max-width: 380px; background: linear-gradient(160deg, #1d2a48, #15203a);
    border: 1px solid var(--ring); border-radius: 18px; padding: 24px 22px 20px; text-align: center;
    box-shadow: 0 30px 70px rgba(0,0,0,.55); transform: translateY(10px) scale(.97); transition: transform .2s ease; }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }
  .modal .m-icon { font-size: 34px; margin-bottom: 8px; }
  .modal .m-msg { font-size: 15px; line-height: 1.5; color: var(--text); margin-bottom: 20px; }
  .modal .m-actions { display: flex; gap: 10px; }
  .modal .m-btn { flex: 1; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .modal .m-cancel { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid var(--ring); }
  .modal .m-cancel:hover { background: rgba(255,255,255,.15); }
  .modal .m-danger { background: linear-gradient(135deg, #c0392b, #e05a48); color: #fff; }
  .modal .m-ok { background: linear-gradient(135deg, #1e7a48, #2fae6a); color: #fff; }
  .modal .m-danger:hover, .modal .m-ok:hover { filter: brightness(1.08); }
  .modal .m-msg ol { text-align: left; margin: 6px 0 0; padding-left: 20px; }
  .modal .m-msg li { margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">Redes Informáticas y Comunicación</span>
    <h1>Tarjetas de estudio</h1>
    <p class="lead">Elegí un mazo para repasar. Tocá una tarjeta para ver la respuesta, marcá lo que ya sabés y mezclá para autoevaluarte. Tu progreso se guarda en este dispositivo.</p>
    <button class="install hide" id="installBtn">⬇️ Instalar app</button>
  </header>

  <div class="decks" id="decks"></div>

  <footer>
    IES N.º 6023 · Capítulos 1 y 2 - TPs <br>
    <button class="reset" id="reset">Borrar todo el progreso</button>
  </footer>
</div>

  <!-- Diálogo propio -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="m-icon">🗑️</div>
      <div class="m-msg" id="modalMsg"></div>
      <div class="m-actions" id="modalActions"></div>
    </div>
  </div>

<script src="data.js"></script>
<script>
  /* ---- Diálogo propio: reemplaza confirm() del navegador ---- */
  const _modal = document.getElementById("modal");
  const _mMsg = document.getElementById("modalMsg");
  const _mActions = document.getElementById("modalActions");
  function uiConfirm(msg, { ok = "Sí, borrar", cancel = "Cancelar" } = {}){
    return new Promise(resolve => {
      _mMsg.innerHTML = msg; _mActions.innerHTML = "";
      const c = document.createElement("button"); c.className = "m-btn m-cancel"; c.textContent = cancel;
      const o = document.createElement("button"); o.className = "m-btn m-danger"; o.textContent = ok;
      c.onclick = () => { _modal.classList.remove("show"); resolve(false); };
      o.onclick = () => { _modal.classList.remove("show"); resolve(true); };
      _mActions.append(c, o); _modal.classList.add("show"); o.focus();
    });
  }
  function uiInfo(msg, icon = "📲"){
    document.querySelector("#modal .m-icon").textContent = icon;
    _mMsg.innerHTML = msg; _mActions.innerHTML = "";
    const o = document.createElement("button"); o.className = "m-btn m-ok"; o.textContent = "Entendido";
    o.onclick = () => _modal.classList.remove("show");
    _mActions.append(o); _modal.classList.add("show"); o.focus();
  }
  _modal.addEventListener("click", e => { if (e.target === _modal) _modal.classList.remove("show"); });

  /* ---- Botón "Instalar app" (PWA) ---- */
  const installBtn = document.getElementById("installBtn");
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferredPrompt = null;

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isStandalone) installBtn.classList.remove("hide");
  });
  window.addEventListener("appinstalled", () => { installBtn.classList.add("hide"); deferredPrompt = null; });

  // iPhone (Safari) no dispara beforeinstallprompt: mostramos el botón con instrucciones
  if (isIOS && !isStandalone) installBtn.classList.remove("hide");

  installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === "accepted") installBtn.classList.add("hide");
    } else if (isIOS) {
      uiInfo("Para instalar en iPhone:<ol><li>Tocá el botón <b>Compartir</b> (el cuadradito con la flecha ↑).</li><li>Bajá y tocá <b>«Agregar a inicio»</b>.</li></ol>");
    } else {
      uiInfo("Para instalarla:<ol><li>Abrí el menú <b>⋮</b> del navegador (arriba a la derecha).</li><li>Elegí <b>«Instalar app»</b> o <b>«Agregar a la pantalla principal»</b>.</li></ol>Si no aparece, puede que ya esté instalada. 🙂", "💡");
    }
  });

  const cont = document.getElementById("decks");

  function loadProgress(id) {
    try { return JSON.parse(localStorage.getItem("redes-progress-" + id)) || {}; }
    catch { return {}; }
  }

  Object.values(DECKS).forEach(deck => {
    const total = deck.cards.length;
    const prog = loadProgress(deck.id);
    const known = Object.values(prog).filter(v => v === "known").length;
    const pct = total ? Math.round(known / total * 100) : 0;

    const a = document.createElement("a");
    a.className = "deck";
    a.href = "study.html?deck=" + deck.id;
    a.innerHTML = `
      <span class="bar" style="background:linear-gradient(${deck.color},${deck.color2})"></span>
      <div class="n" style="color:${deck.color2}">${deck.short.split("·")[0].trim()}</div>
      <h2>${deck.short.split("·").slice(1).join("·").trim() || deck.short}</h2>
      <p>${total} tarjetas para repasar</p>
      <div class="meta">
        <span class="pill">${known}/${total} dominadas</span>
        <span class="go">Estudiar →</span>
      </div>
      <div class="progress-mini"><span style="width:${pct}%;background:linear-gradient(90deg,${deck.color},${deck.color2})"></span></div>
    `;
    cont.appendChild(a);
  });

  // Service worker (PWA / offline)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }

  document.getElementById("reset").addEventListener("click", async () => {
    if (await uiConfirm("¿Querés borrar el progreso de <b>todos</b> los mazos? Esta acción no se puede deshacer.", { ok: "Sí, borrar todo" })) {
      Object.keys(DECKS).forEach(id => localStorage.removeItem("redes-progress-" + id));
      location.reload();
    }
  });
</script>
</body>
</html>
